name: RCE Analysis Pipeline

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test_injection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Vulnerable Input Processing
        # ئەم بەشە Input-یەک لە ناوی Branch یان Titleـی PR وەردەگرێت
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "Processing PR: $TITLE"
          eval "echo $TITLE"
